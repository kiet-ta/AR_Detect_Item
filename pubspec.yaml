name: magic_doodle
description: "EdTech app that transforms children's drawings into 3D models using Edge AI."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # --- State Management ---
  flutter_bloc: ^8.1.6
  equatable: ^2.0.7

  # --- Dependency Injection ---
  get_it: ^8.0.0
  injectable: ^2.4.4

  # --- Navigation ---
  go_router: ^14.2.7

  # --- Firebase ---
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3

  # --- Local Persistence ---
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # --- ML / AI ---
  tflite_flutter: ^0.10.4

  # --- Camera ---
  camera: ^0.11.0+2

  # --- 3D Rendering ---
  model_viewer_plus: ^1.9.1

  # --- Audio ---
  just_audio: ^0.9.40

  # --- Network ---
  connectivity_plus: ^6.0.5

  # --- Functional Programming ---
  dartz: ^0.10.1

  # --- Image Processing ---
  image: ^4.2.0

  # --- Utilities ---
  uuid: ^4.4.2
  logger: ^2.4.0
  rxdart: ^0.28.0

  # --- Background Jobs ---
  workmanager: ^0.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # --- Code Generation ---
  injectable_generator: ^2.6.2
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

  # --- Testing ---
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  fake_async: ^1.3.1

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/ml_models/
    - assets/audio/
    - assets/images/
