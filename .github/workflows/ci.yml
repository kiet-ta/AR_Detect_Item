name: Magic Doodle CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FLUTTER_VERSION: "3.27.0"

jobs:
  analyze_and_test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib/ test/

      - name: Analyze code
        run: flutter analyze --fatal-infos

      - name: Run unit tests with coverage
        run: flutter test --coverage --coverage-package=magic_doodle

      - name: Check domain layer coverage ≥ 90%
        run: |
          COVERAGE=$(dart run coverage:format_coverage \
            --lcov \
            --in=coverage/lcov.info \
            --report-on=lib/domain \
            2>&1 | grep -oP '\d+\.\d+(?=%)' | tail -1)
          echo "Domain coverage: $COVERAGE%"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          flags: unittests

  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: analyze_and_test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: "stable"
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: flutter build apk --release --obfuscate --split-debug-info=./debug-symbols

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: magic-doodle-release.apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
